name: ESP32 OTA Build

on:
  push:
    branches:
      - dev
      - main
      - master

permissions:
  contents: write

jobs:
  build-esp32-ota:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esp32_display

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set OTA metadata
        id: meta
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          if [[ "$branch" == "dev" ]]; then
            channel="dev"
          else
            channel="stable"
          fi

          short_sha="$(git rev-parse --short=12 HEAD)"
          commit_count="$(git rev-list --count HEAD)"
          version="${OTA_VERSION:-0.1.${commit_count}}"
          build_number="${OTA_BUILD_NUMBER:-${commit_count}}"
          firmware_url="${OTA_FIRMWARE_URL:-firmware.bin}"
          min_supported="${OTA_MIN_SUPPORTED_VERSION:-}"
          tag_name="ota-${channel}-latest"
          range_args=()
          if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
            previous_commit="$(git rev-list -n 1 "refs/tags/${tag_name}")"
            if git merge-base --is-ancestor "${previous_commit}" HEAD; then
              range_args+=("${previous_commit}..HEAD")
            fi
          fi

          notes_file="$(mktemp)"
          if [[ -n "${OTA_RELEASE_NOTES:-}" ]]; then
            printf "%s\n" "${OTA_RELEASE_NOTES}" > "${notes_file}"
          else
            mapfile -t commit_subjects < <(
              git log "${range_args[@]}" --no-merges --pretty=format:%s -n 8
            )
            if [[ "${#commit_subjects[@]}" -eq 0 ]]; then
              printf -- "- %s build %s (%s)\n" "${channel}" "${version}" "${short_sha}" > "${notes_file}"
            else
              for subject in "${commit_subjects[@]}"; do
                printf -- "- %s\n" "${subject}" >> "${notes_file}"
              done
            fi
          fi

          {
            echo "channel=${channel}"
            echo "version=${version}"
            echo "build_number=${build_number}"
            echo "short_sha=${short_sha}"
            echo "firmware_url=${firmware_url}"
            echo "min_supported=${min_supported}"
            echo "release_notes<<EOF"
            cat "${notes_file}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Generate CI PlatformIO config
        run: |
          python scripts/write_ci_platformio_config.py \
            --version "${{ steps.meta.outputs.version }}" \
            --build-number ${{ steps.meta.outputs.build_number }} \
            --channel "${{ steps.meta.outputs.channel }}"

      - name: Build firmware
        run: pio run -c platformio-ci.ini -e esp32-s3-n16r8

      - name: Package OTA artifacts
        run: |
          python scripts/package_ota.py \
            --firmware .pio/build/esp32-s3-n16r8/firmware.bin \
            --out-dir dist/${{ steps.meta.outputs.channel }} \
            --channel ${{ steps.meta.outputs.channel }} \
            --version "${{ steps.meta.outputs.version }}" \
            --build-number ${{ steps.meta.outputs.build_number }} \
            --git-branch "${GITHUB_REF_NAME}" \
            --git-commit "${GITHUB_SHA}" \
            --firmware-url "${{ steps.meta.outputs.firmware_url }}" \
            --min-supported-version "${{ steps.meta.outputs.min_supported }}" \
            --release-notes "${{ steps.meta.outputs.release_notes }}" \
            --changelog-url "CHANGELOG.md"

      - name: Upload OTA artifact
        uses: actions/upload-artifact@v4
        with:
          name: amap-esp32-${{ steps.meta.outputs.channel }}-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}
          path: esp32_display/dist/${{ steps.meta.outputs.channel }}/*
          if-no-files-found: error

      - name: Publish rolling GitHub Release
        if: github.ref_name == 'dev' || github.ref_name == 'main' || github.ref_name == 'master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ota-${{ steps.meta.outputs.channel }}-latest
          name: OTA ${{ steps.meta.outputs.channel }} latest
          prerelease: ${{ steps.meta.outputs.channel == 'dev' }}
          overwrite_files: true
          make_latest: false
          files: esp32_display/dist/${{ steps.meta.outputs.channel }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
