plugins {
    id "com.android.application"
}

android {
    namespace "com.zuoqirun.amapesp32forwarder"
    compileSdk 36

    defaultConfig {
        applicationId "com.zuoqirun.amapesp32forwarder"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig = true
    }

    testOptions {
        unitTests.returnDefaultValues = true
    }
}

dependencies {
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.json:json:20240303"
}
